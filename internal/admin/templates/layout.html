<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} — Portfolio CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>
    <style>
      .flash-error {
        background: #fef2f2;
        border-left: 3px solid #dc2626;
        color: #991b1b;
      }
      .flash-success {
        background: #f0fdf4;
        border-left: 3px solid #16a34a;
        color: #166534;
      }
      :root {
        --ch-950: #0f0e0f;
        --ch-900: #161516;
        --ch-800: #1e1d1e;
        --ch-700: #252425;
        --ch-600: #30353b;
        --ch-500: #4d4c4d;
        --ch-400: #6b6a6b;
        --ch-300: #9a9899;
        --ch-200: #c5c3c4;
        --ch-100: #e8e6e7;
        --ch-50: #f5f4f5;
        --accent: #e2e0df;
        --accent-active: #ffffff;
        --ring: #6b6a6b;
      }

      /* Sidebar nav link states */
      .nav-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13.5px;
        font-weight: 400;
        color: var(--ch-300);
        text-decoration: none;
        transition:
          background 0.12s,
          color 0.12s;
      }
      .nav-link:hover {
        background: var(--ch-700);
        color: var(--ch-100);
      }
      .nav-link.active {
        background: var(--ch-600);
        color: var(--accent-active);
        font-weight: 500;
      }
      .nav-icon {
        width: 28px;
        height: 28px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        background: transparent;
        transition: background 0.12s;
      }
      .nav-link.active .nav-icon {
        background: var(--ch-500);
      }

      /* Scrollbar minimal */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--ch-500);
        border-radius: 2px;
      }

      /* HTMX */
      .htmx-indicator {
        display: none;
      }
      .htmx-request .htmx-indicator {
        display: inline;
      }

      /* Flash auto-dismiss */
      .flash-bar {
        transition: opacity 0.4s;
      }
      .flash-bar.fade {
        opacity: 0;
      }

      /* Table row delete fade */
      tr.deleting {
        transition: opacity 0.3s;
        opacity: 0;
      }

      /* Focus ring consistent */
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        box-shadow: 0 0 0 2px var(--ring);
      }
    </style>
  </head>
  <body
    style="
      background: #f0eff0;
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      display: flex;
      min-height: 100vh;
    "
  >
    <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
    <aside
      style="
        width: 220px;
        min-height: 100vh;
        background: var(--ch-900);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        z-index: 20;
      "
    >
      <!-- Logo -->
      <div
        style="padding: 20px 16px 16px; border-bottom: 1px solid var(--ch-700)"
      >
        <div style="display: flex; align-items: center; gap: 8px">
          <div
            style="
              width: 28px;
              height: 28px;
              background: var(--ch-600);
              border-radius: 6px;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 14px;
            "
          >
            ⬡
          </div>
          <div>
            <p
              style="
                color: #ffffff;
                font-size: 13px;
                font-weight: 600;
                margin: 0;
                letter-spacing: 0.01em;
              "
            >
              Portfolio CMS
            </p>
            <p style="color: var(--ch-400); font-size: 11px; margin: 0">
              Admin Panel
            </p>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <nav style="flex: 1; padding: 10px 8px; overflow-y: auto">
        <p
          style="
            color: var(--ch-100);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 8px 12px 4px;
            margin: 0;
          "
        >
          Menu
        </p>
        {{range .Nav}}
        <a
          href="{{.Href}}"
          class="nav-link {{if eq $.ActiveMenu .Label}}active{{end}}"
        >
          <span class="nav-icon">{{.Icon}}</span>
          {{.Label}}
        </a>
        {{end}}
      </nav>

      <!-- Footer -->
      <div style="padding: 10px 8px; border-top: 1px solid var(--ch-700)">
        <a href="/admin/logout" class="nav-link" style="color: var(--ch-100)">
          <span class="nav-icon" style="font-size: 13px">↩</span>
          Logout
        </a>
      </div>
    </aside>

    <!-- ── Main ─────────────────────────────────────────────────────────────── -->
    <div
      style="
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin-left: 220px;
      "
    >
      <!-- Topbar -->
      <header
        style="
          background: #ffffff;
          border-bottom: 1px solid #e5e3e4;
          padding: 0 28px;
          height: 56px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          position: sticky;
          top: 0;
          z-index: 10;
        "
      >
        <div style="display: flex; align-items: center; gap: 8px">
          <span style="color: var(--ch-400); font-size: 12px">Admin</span>
          <span style="color: var(--ch-300); font-size: 12px">/</span>
          <span
            style="color: var(--ch-800); font-size: 13.5px; font-weight: 500"
            >{{.Title}}</span
          >
        </div>
        <div style="display: flex; align-items: center; gap: 12px">
          <a
            href="/api/v1/public/profile"
            target="_blank"
            style="
              font-size: 12px;
              color: var(--ch-400);
              text-decoration: none;
              display: flex;
              align-items: center;
              gap: 4px;
            "
          >
            ↗ Public API
          </a>
          <div
            style="
              width: 30px;
              height: 30px;
              border-radius: 50%;
              background: var(--ch-800);
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 12px;
              color: var(--ch-200);
            "
          >
            A
          </div>
        </div>
      </header>

      <!-- Content -->
      <main style="flex: 1; padding: 28px; width: 100%; {{if eq .Title "Dashboard"}}max-width: none;{{else}}max-width: 1200px;{{end}}">
        {{if .Flash}}
        <div
          id="flash-msg"
          class="flash-bar {{if .FlashIsError}}flash-error{{else}}flash-success{{end}}"
          style="
            margin-bottom: 20px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
          "
          _="on load wait 3.5s then add .fade then wait 0.4s then remove me"
        >
          {{if .FlashIsError}}⚠{{else}}✓{{end}}&nbsp;{{.Flash}}
        </div>
        {{end}} {{.Content}}
      </main>

      <footer
        style="
          padding: 16px 28px;
          border-top: 1px solid #e5e3e4;
          font-size: 11.5px;
          color: var(--ch-300);
          display: flex;
          align-items: center;
          justify-content: space-between;
        "
      >
        <span>Portfolio CMS · Go Fiber + GORM + PostgreSQL</span>
        <span style="color: var(--ch-200)">v1.0.0</span>
      </footer>
    </div>
  </body>
</html>
